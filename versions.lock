# IdeiaOS — lockfile de versões dos componentes upstream
# =============================================================================
# "pin" = versão que TODA máquina deve convergir. Drift = instalado ≠ pin.
# Lido por: scripts/idea-doctor.sh (audita drift) e scripts/update-upstream.sh.
# Atualizado por: scripts/update-upstream.sh --bump (grava o instalado aqui).
#
# Formato: chave=valor (um por linha; # comenta). NÃO use aspas.
# =============================================================================

# AIOX-core — versão do CLI `aiox --version` (NÃO o package.json do .aiox-core)
aiox-core=5.2.9

# GSD (plugin Claude Code; ~/.claude/get-shit-done/VERSION)
# ⚠ ARMADILHA DE VERSÃO: migrou para @opengsd/get-shit-done-redux e o
#   versionamento RECOMEÇOU em 1.x — 1.1.0 (redux) é MAIS NOVO que 1.36.0
#   (pré-redux). Valores 1.3x/1.4x aqui = legado ERRADO (pin já foi revertido
#   3× assim em 2026-06).
# NÃO edite esta linha na mão. Único escritor: scripts/update-upstream.sh --bump.
#   O pre-commit bloqueia violações (scripts/check-versions-lock.sh) e o
#   git-autosync ignora este arquivo.
gsd=1.1.0

# Suíte de Design (vendorizada; fonte nextlevelbuilder/ui-ux-pro-max-skill)
# ref = tag/branch/commit pinado; commit = hash curto resolvido no último update.
design-suite-ref=main
design-suite-commit=local-seed-2026-06-02

# MCPs (user scope). npx @latest resolve no runtime — o spec é o contrato.
mcp-chrome-devtools=chrome-devtools-mcp@latest
mcp-context7=@upstash/context7-mcp@latest

# Plugins IdeiaOS (marketplace ideiaos — 3 sub-plugins: core/design-suite/lovable)
# Versão 2.0.0 alinhada ao milestone v2.0. Bump manual ao publicar nova release.
ideiaos-plugin=3.0.0

# Última atualização deste lock
updated=2026-06-12
